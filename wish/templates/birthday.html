<!DOCTYPE html>
<html>
<head>
    <title>For Yazhlini 💖</title>

    <!-- 🎆 Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
        }

        /* Start Screen */
        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 20px 35px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff4b5c, #ff758c);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* Main Content */
        #mainContent {
            display: none;
            height: 100vh;
            position: relative;
        }

        /* Glass Card */
        .messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            width: 70%;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.6s ease;
            z-index: 2;
        }

        .show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 22px;
            white-space: pre-line;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50%;
            animation: float 7s linear infinite;
        }

        .balloon:nth-child(1) { left: 10%; background: #ff4b5c; }
        .balloon:nth-child(2) { left: 25%; background: #ffcc00; }
        .balloon:nth-child(3) { left: 40%; background: #00c3ff; }
        .balloon:nth-child(4) { left: 60%; background: #8e44ad; }
        .balloon:nth-child(5) { left: 80%; background: #2ecc71; }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }

        /* Hearts */
        .heart {
            position: absolute;
            font-size: 20px;
            animation: rise 6s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>

<body>

<!-- First Screen -->
<div id="startScreen">
    <button onclick="showSurprise()">💖 Click here for surprise</button>
</div>

<!-- Main Content -->
<div id="mainContent">

    <!-- Balloons -->
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>

    <!-- Hearts -->
    <div class="heart" style="left:20%">💖</div>
    <div class="heart" style="left:50%">💗</div>
    <div class="heart" style="left:75%">💓</div>

    <!-- Message -->
    <div id="messageBox" class="messageBox">
        <h1 id="title"></h1>
        <p id="emoji"></p>
        <p id="text"></p>
    </div>

</div>

<script>
    function showSurprise() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

        // 🎆 CONFETTI BURST
        confetti({
            particleCount: 150,
            spread: 120,
            origin: { y: 0.6 }
        });

        setTimeout(() => {
            confetti({ particleCount: 100, spread: 100 });
        }, 300);

        setTimeout(() => {
            confetti({ particleCount: 120, spread: 140 });
        }, 600);

        // Show message
        setTimeout(() => {
            document.getElementById("messageBox").classList.add("show");
            startTyping();
        }, 500);
    }

    function typeEffect(element, text, speed, callback) {
        let i = 0;
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            } else if (callback) {
                callback();
            }
        }
        typing();
    }

    function startTyping() {
        const title = document.getElementById("title");
        const emoji = document.getElementById("emoji");
        const text = document.getElementById("text");

        typeEffect(title, "🎂 Happy Birthday Yazhlini 🎉 💖", 50, () => {
            typeEffect(emoji, "✨🎈🥳💐🌸", 80, () => {
                typeEffect(text, "You are such a beautiful soul and a real gem 💎\nStay happy always 😊💖", 40);
            });
        });
    }
</script>

</body>
</html>
