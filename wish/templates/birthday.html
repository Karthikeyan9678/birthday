<!DOCTYPE html>
<html>
<head>
    <title>Surprise 🎉</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        /* First Screen */
        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 20px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background-color: #ff4b5c;
            color: white;
            cursor: pointer;
        }

        /* Second Screen */
        #mainContent {
            display: none;
            height: 100vh;
            position: relative;
        }

        /* Message Pop-up */
        .messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 70%;
            opacity: 0;
            transition: all 0.6s ease;
            z-index: 2;
        }

        .show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        h1 {
            color: #ff4b5c;
        }

        p {
            font-size: 20px;
            white-space: pre-line;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50%;
            animation: float 6s linear infinite;
        }

        .balloon:nth-child(1) { left: 10%; background: #ff4b5c; }
        .balloon:nth-child(2) { left: 30%; background: #ffcc00; animation-duration: 8s; }
        .balloon:nth-child(3) { left: 50%; background: #00c3ff; animation-duration: 7s; }
        .balloon:nth-child(4) { left: 70%; background: #8e44ad; animation-duration: 9s; }
        .balloon:nth-child(5) { left: 90%; background: #2ecc71; animation-duration: 6s; }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
    </style>
</head>

<body>

<!-- First Screen -->
<div id="startScreen">
    <button onclick="showSurprise()">🎁 Click here for surprise</button>
</div>

<!-- Second Screen -->
<div id="mainContent">

    <!-- Balloons -->
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>

    <!-- Message -->
    <div id="messageBox" class="messageBox">
        <h1 id="title"></h1>
        <p id="emoji"></p>
        <p id="text"></p>
    </div>

</div>

<script>
    function showSurprise() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

        setTimeout(() => {
            document.getElementById("messageBox").classList.add("show");
            startTyping();
        }, 300);
    }

    function typeEffect(element, text, speed, callback) {
        let i = 0;
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            } else if (callback) {
                callback();
            }
        }
        typing();
    }

    function startTyping() {
        const title = document.getElementById("title");
        const emoji = document.getElementById("emoji");
        const text = document.getElementById("text");

        typeEffect(title, "🎂 Happy Birthday Yazhlini 🎉 💖", 50, () => {
            typeEffect(emoji, "✨🎈🥳💐🌸", 80, () => {
                typeEffect(text, "You are such a beautiful soul and a real gem 💎\nStay happy always 😊💖", 40);
            });
        });
    }
</script>

</body>
</html>
